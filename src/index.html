function change_Top_Pic(){
    var topPic = document.subPane1.tMode.value + document.subPane1.tPack.value;
    e = document.getElementById("topImage");
	e.src = topPic;

}
function change_Bottom_Pic(){

	tPack_C();	
}
function but_BotNext(){

	a = document.subPane2.bPack.selectedIndex - 1;
	if (a < 0) {a = NumSRC;}
	document.subPane2.bPack.selectedIndex = a;
	bPack_C();	
}
function gup( name ){  
	name = name.replace(/[\[]/,"\\\[").replace(/[\]]/,"\\\]");  
	var regexS = "[\\?&]"+name+"=([^&#]*)";  
	var regex = new RegExp( regexS );  
	var results = regex.exec( window.location.href );  
	if( results == null )    
		return "";  
	else    
		return results[1];
}
function loadSaved(){
    var a, b, c, d;
    a = parseInt(Spec.charAt(0)); b=parseInt(Spec.charAt(1)); c=parseInt(Spec.charAt(2)); d=parseInt(Spec.charAt(3));
    if (a){document.subPane2.matchTop_pack.checked = true;}else{document.subPane2.matchTop_pack.checked = false;}
    if (b){document.subPane2.matchTop_dm.checked = true;}else{document.subPane2.matchTop_dm.checked = false;}
    document.subPane1.tMode.selectedIndex = c;
    var temp = document.getElementById('tPack');
    temp.value = tWhere + ".png";
    document.subPane2.bMode.selectedIndex = d;
    temp = document.getElementById('bPack');
    temp.value = bWhere + ".png";
    
    tPack_C();
    bPack_C();
}
function Feed(){
    if (Spec){
        loadSaved();
    }else{
        if (tWhere=="" && bWhere==""){ //Make a reandom selection for both upper and lower slots
            var tRandom = (Math.floor(Math.random() * NumSRC/2))+1;
            var bRandom = Math.floor((NumSRC/2) + (Math.random() * ((NumSRC/2)+1)));
            document.subPane1.tPack.selectedIndex = tRandom;
            document.subPane2.bPack.selectedIndex = bRandom;    
            tPack_C();
            bPack_C();
       }
        if (tWhere != "") {
            tWhere += ".png";
            document.subPane1.tPack.value = tWhere;
            if (bWhere == ""){
                document.subPane2.matchTop_pack.checked=true;
                document.subPane2.matchTop_dm.checked=false;
                document.subPane2.bMode.value = "images/Tone/";
                tPack_C();
            }else{
                bWhere += ".png";
                document.subPane2.bPack.value = bWhere;
                tPack_C();
                bPack_C();
            }	
        }
    }
}
function copyIt(){
    var a, b, c, d;
    if (document.subPane2.matchTop_pack.checked){a = 1;}else{a=0;}
    if (document.subPane2.matchTop_dm.checked){b = 1;}else{b=0;}
    c = document.subPane1.tMode.selectedIndex;
    d = document.subPane2.bMode.selectedIndex;
    var copyText = "https://megapro17.github.io/src/index.html?Top=" + document.subPane1.tPack.value.substring(0, document.subPane1.tPack.value.length-4) + "&Bot=" + document.subPane2.bPack.value.substring(0, document.subPane2.bPack.value.length-4);
    copyText += "&Spec=" + a+b+c+d;
    var bucket = document.createElement('textarea');
    bucket.value = copyText;
    bucket.setAttribute('readonly', '');
    bucket.style = {position: 'absolute', left: '-9999px'};
    document.body.appendChild(bucket);
    bucket.select();
    document.execCommand('copy');
    document.body.removeChild(bucket);
    alert("Link sent to the clipboard.");
}
